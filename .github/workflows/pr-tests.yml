name: PR Test Validation

on:
  pull_request:
    branches:
      - main
      - master
      - develop
    types:
      - opened
      - synchronize
      - reopened

jobs:
  smoke-tests:
    name: Smoke Tests (PR Validation)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Run TypeScript compilation check
        run: npx tsc --noEmit
      
      - name: Run smoke tests
        env:
          CI: true
          WORKERS: 4
        run: ./scripts/run-tests.sh smoke
      
      - name: Generate Allure report
        if: always()
        run: npm run allure:generate
      
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr-${{ github.event.pull_request.number }}
          path: playwright-report/
          retention-days: 14
      
      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-pr-${{ github.event.pull_request.number }}
          path: allure-report/
          retention-days: 14
      
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-pr-${{ github.event.pull_request.number }}
          path: allure-results/
          retention-days: 7
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-pr-${{ github.event.pull_request.number }}
          path: test-results/
          retention-days: 7
      
      - name: Comment PR with test results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            
            const comment = `## ${emoji} Smoke Test Results
            
            **Status:** ${status}
            **Commit:** ${context.sha.substring(0, 7)}
            **Workflow:** [View Details](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            
            ${status === 'success' ? '✅ All smoke tests passed!' : '❌ Some tests failed. Please check the workflow details.'}
            
            📊 **Reports Available:**
            - [Playwright HTML Report](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            - [Allure Report](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            `;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
      
      - name: Check test status
        if: failure()
        run: |
          echo "::error::Smoke tests failed. Please fix the failing tests before merging."
          exit 1

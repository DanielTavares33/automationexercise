name: Scheduled Regression Tests

on:
  schedule:
    # Run daily at 2:00 AM UTC
    - cron: '0 2 * * *'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  regression-tests:
    name: Nightly Regression Suite
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run TypeScript compilation check
        run: npx tsc --noEmit

      - name: Run regression tests
        env:
          CI: true
          WORKERS: 4
        run: ./scripts/run-tests.sh regression

      - name: Generate Allure report
        if: always()
        run: npm run allure:generate

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-regression-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-regression-${{ github.run_number }}
          path: allure-report/
          retention-days: 30

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-latest
          path: allure-results/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-regression-${{ github.run_number }}
          path: test-results/
          retention-days: 14

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Nightly Regression Tests Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `## Regression Test Failure

            The nightly regression test suite has failed.

            **Details:**
            - **Date:** ${new Date().toISOString()}
            - **Workflow Run:** [View Details](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            - **Commit:** ${context.sha.substring(0, 7)}

            **Action Required:**
            1. Review the [test results](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            2. Download report artifacts (Playwright HTML or Allure) for detailed analysis
            3. Fix failing tests or update test expectations
            4. Close this issue once resolved

            ---
            *This issue was automatically created by the scheduled regression workflow.*
            `;

            // Check if an issue already exists for today
            const today = new Date().toISOString().split('T')[0];
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'automated-test-failure',
              per_page: 100
            });

            const existingIssue = issues.data.find(issue =>
              issue.title.includes(today)
            );

            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['automated-test-failure', 'regression']
              });
            } else {
              console.log('Issue already exists for today:', existingIssue.number);
            }

      - name: Test Summary
        if: always()
        run: |
          echo "## 🌙 Nightly Regression Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Workers:** 4" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ All regression tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some tests failed. An issue has been created automatically." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 **Reports Available:**" >> $GITHUB_STEP_SUMMARY
          echo "- [Playwright HTML Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Allure Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
